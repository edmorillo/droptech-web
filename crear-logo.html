<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estudio de Logo | Computadoras Lei</title>
    <style>
        body {
            /* El fondo azul oscuro exacto de tu web */
            background-color: #070A0F;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .logo-gigante {
            width: 400px;
            height: 400px;
            /* Le damos el mismo brillo neón que tiene en tu barra de navegación */
            filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.6));
        }
    </style>
</head>
<body>

    <!-- Tu logo original convertido a tamaño gigante -->
    <svg class="logo-gigante" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="7" width="16" height="11" rx="1.5" stroke="#00F0FF" stroke-width="2"/>
        <path d="M6 18L4 23H16L14 18" stroke="#00F0FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="21" y="5" width="8" height="18" rx="1.5" stroke="#00F0FF" stroke-width="2"/>
        <path d="M24 8H26" stroke="#00F0FF" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M24 11H26" stroke="#00F0FF" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M7 12.5H13M10 9.5V15.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    </svg>

</body>
</html>
