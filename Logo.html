<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Logo V2 - Computadoras Lei</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #05070a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .logo-container {
            text-align: center;
            font-family: 'Poppins', sans-serif;
            background: #0b0f17;
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1);
        }
        .icon {
            width: 130px;
            height: 130px;
            margin-bottom: 15px;
        }
        .title {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
            color: #fff;
            line-height: 1.1;
        }
        .highlight {
            color: #00F0FF;
        }
        
        /* Contenedor especial para alinear el texto y el foquito */
        .subtitle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px; /* Espacio entre el texto y el foco */
            margin-top: 15px;
        }
        
        .subtitle {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 6px;
            color: #00F0FF;
            margin: 0;
            /* Compensamos el letter-spacing final para que quede perfectamente centrado */
            padding-left: 6px; 
        }

        /* Estilo del foquito SVG */
        .bulb-icon {
            width: 26px;
            height: 26px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <svg class="icon" viewBox="0 0 64 64" fill="none" stroke="#00F0FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="12" y="10" width="40" height="28" rx="3"/>
            <path d="M8 46L10 38H54L56 46C56 48.2091 54.2091 50 52 50H12C9.79086 50 8 48.2091 8 46Z" fill="#05070a"/>
            <circle cx="22" cy="43" r="1.5" fill="#00F0FF" stroke="none"/>
            <circle cx="28" cy="43" r="1.5" fill="#00F0FF" stroke="none"/>
            <circle cx="34" cy="43" r="1.5" fill="#00F0FF" stroke="none"/>
            <circle cx="40" cy="43" r="1.5" fill="#00F0FF" stroke="none"/>
            <circle cx="25" cy="46" r="1.5" fill="#00F0FF" stroke="none"/>
            <circle cx="31" cy="46" r="1.5" fill="#00F0FF" stroke="none"/>
            <circle cx="37" cy="46" r="1.5" fill="#00F0FF" stroke="none"/>
            <path d="M28 24H36" stroke-width="1.5" opacity="0.3"/>
        </svg>
        
        <h1 class="title">COMPUTADORAS<br><span class="highlight">LEI</span></h1>
        
        <div class="subtitle-container">
            <p class="subtitle">SOPORTE & HARDWARE</p>
            
            <svg class="bulb-icon" viewBox="0 0 24 24" fill="none" stroke="#00F0FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .6 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5" />
                <path d="M9 18h6M10 22h4" />
                <path d="M12 2v1M21 8h-1M4 8H3M18.3.3l-.7.7M5.7 12.9l-.7.7M17.6 12.9l.7.7M4.3.3l.7.7" opacity="0.8"/>
            </svg>
        </div>
    </div>

</body>
</html>
