<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña | Computadoras Lei</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #070A0F; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Poppins', sans-serif; }
        .card { background: #111622; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid rgba(0, 240, 255, 0.1); }
        input { width: 100%; padding: 14px; margin: 15px 0; border-radius: 8px; background: #1E293B; border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; }
        button { width: 100%; padding: 14px; background: #00F0FF; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; color: #000; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Nueva Contraseña</h2>
        <p style="color: #94A3B8; font-size: 13px;">Escribí tu nueva contraseña para acceder al sistema.</p>
        <input type="password" id="new-password" placeholder="Nueva contraseña" required>
        <button onclick="actualizarContrasena()" id="btn-actualizar">Actualizar</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbsjjqrizxdinmzystfu.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_CNCfFsHb-yGfE45YhHoFHQ_mS1Cpi7C';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function actualizarContrasena() {
            const nuevaPass = document.getElementById('new-password').value;
            const btn = document.getElementById('btn-actualizar');

            if (nuevaPass.length < 6) {
                alert("La contraseña debe tener al menos 6 caracteres");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Actualizando...";

            const { data, error } = await db.auth.updateUser({
                password: nuevaPass
            });

            if (error) {
                alert("Error al actualizar: " + error.message);
                btn.disabled = false;
                btn.innerText = "Actualizar";
            } else {
                alert("¡Contraseña actualizada con éxito!");
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
