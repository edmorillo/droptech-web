<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | Computadoras Lei</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #070A0F; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; background-image: radial-gradient(circle at top right, #101626 0%, #070A0F 100%); }

        .brand-container { display: flex; align-items: center; gap: 15px; margin-bottom: 35px; }
        .brand-container i { font-size: 38px; color: #00F0FF; filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.4)); }
        .brand-container h1 { font-size: 30px; font-weight: 800; letter-spacing: 1px; color: #fff; margin: 0; }
        .brand-container h1 span { color: #00F0FF; }

        .login-card { background: #111622; padding: 45px 40px; border-radius: 12px; border: 1px solid rgba(0, 240, 255, 0.1); width: 100%; max-width: 420px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        .login-card h2 { color: #fff; font-size: 20px; margin-bottom: 10px; font-weight: 700; }
        .login-card p { color: #94A3B8; font-size: 13px; margin-bottom: 30px; }

        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #94A3B8; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.icon-left { position: absolute; left: 16px; color: #94A3B8; font-size: 15px; transition: 0.3s; }
        
        input { width: 100%; padding: 15px 15px 15px 48px; background: #1E293B; border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: #00F0FF; box-shadow: 0 0 15px rgba(0, 240, 255, 0.1); background: #171e2c; }
        input:focus ~ i.icon-left, input:not(:placeholder-shown) ~ i.icon-left { color: #00F0FF; }
        
        .eye-btn { position: absolute; right: 15px; background: transparent; border: none; color: #94A3B8; cursor: pointer; font-size: 16px; transition: 0.3s; padding: 5px; }
        .eye-btn:hover { color: #00F0FF; }

        .btn-login { width: 100%; padding: 15px; background: #00F0FF; color: #070A0F; border: none; border-radius: 8px; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 240, 255, 0.2); display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-login:hover { background: #00c4d1; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 240, 255, 0.4); }

        .toast { position: fixed; top: 30px; right: 30px; background: #00ff66; color: #000; padding: 15px 25px; border-radius: 8px; font-weight: 700; display: none; z-index: 999999; box-shadow: 0 5px 15px rgba(0, 255, 102, 0.3); animation: slideIn 0.3s ease; }
        .toast.error { background: #ff4a4a; color: #fff; box-shadow: 0 5px 15px rgba(255, 74, 74, 0.3); }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="toast" id="toast"><i class="fa-solid fa-check"></i> Mensaje</div>

    <div class="brand-container">
        <i class="fa-solid fa-microchip"></i>
        <h1>Computadoras <span>Lei</span></h1>
    </div>

    <div class="login-card">
        <h2>Crear Nueva Contraseña</h2>
        <p>Estás a un paso de recuperar tu acceso.</p>
        
        <form id="form-reset">
            <div class="form-group">
                <label>Nueva Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" required>
                    <i class="fa-solid fa-lock icon-left"></i>
                    <button type="button" class="eye-btn" onclick="togglePassword()" title="Mostrar/Ocultar contraseña">
                        <i class="fa-solid fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="btn-submit" class="btn-login">
                <i class="fa-solid fa-floppy-disk"></i> Guardar y Acceder
            </button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbsjjqrizxdinmzystfu.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_CNCfFsHb-yGfE45YhHoFHQ_mS1Cpi7C';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function mostrarToast(mensaje, tipo = 'success') {
            const toast = document.getElementById('toast');
            toast.className = 'toast ' + (tipo === 'error' ? 'error' : '');
            toast.innerHTML = tipo === 'success' ? `<i class="fa-solid fa-check"></i> ${mensaje}` : `<i class="fa-solid fa-triangle-exclamation"></i> ${mensaje}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        function togglePassword() {
            const inputPass = document.getElementById('new-password');
            const iconEye = document.getElementById('eye-icon');
            if (inputPass.type === 'password') {
                inputPass.type = 'text';
                iconEye.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                inputPass.type = 'password';
                iconEye.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // El cerebro de Supabase detecta automáticamente el código secreto en la URL
        // y ejecuta el cambio de contraseña al enviar el formulario
        document.getElementById('form-reset').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nuevaPass = document.getElementById('new-password').value;
            const btn = document.getElementById('btn-submit');

            if (nuevaPass.length < 6) {
                mostrarToast("La contraseña debe tener al menos 6 caracteres", "error");
                return;
            }

            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Actualizando...';
            btn.style.pointerEvents = 'none';

            const { data, error } = await db.auth.updateUser({ password: nuevaPass });

            if (error) {
                mostrarToast("Error: El enlace expiró o es inválido.", "error");
                btn.innerHTML = originalHTML;
                btn.style.pointerEvents = 'auto';
            } else {
                mostrarToast("¡Contraseña actualizada con éxito!", "success");
                setTimeout(() => { window.location.href = 'console.html'; }, 2000);
            }
        });
    </script>
</body>
</html>
