<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto | Computadoras Lei</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none'%3E%3Crect x='2' y='7' width='16' height='11' rx='1.5' stroke='%2300F0FF' stroke-width='2'/%3E%3Cpath d='M6 18L4 23H16L14 18' stroke='%2300F0FF' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='21' y='5' width='8' height='18' rx='1.5' stroke='%2300F0FF' stroke-width='2'/%3E%3Cpath d='M24 8H26' stroke='%2300F0FF' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M24 11H26' stroke='%2300F0FF' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M7 12.5H13M10 9.5V15.5' stroke='%23ffffff' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* ESTILOS ESPECÍFICOS PARA LA PÁGINA DE PRODUCTO ESTILO MERCADOLIBRE */
        .product-container { max-width: 1100px; margin: 120px auto 50px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        
        .product-gallery { background: #111622; padding: 20px; border-radius: 12px; border: 1px solid rgba(0, 240, 255, 0.1); }
        .main-image { width: 100%; height: 400px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .main-image:hover { transform: scale(1.02); }
        .thumbnail-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .thumbnail { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; opacity: 0.6; }
        .thumbnail.active { border-color: #00F0FF; opacity: 1; }
        .thumbnail:hover { opacity: 1; }

        .product-details { background: #111622; padding: 30px; border-radius: 12px; border: 1px solid rgba(0, 240, 255, 0.1); }
        .product-tag { font-size: 12px; color: #00F0FF; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .product-title { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 20px; line-height: 1.2; }
        .product-price { font-size: 36px; font-weight: 800; color: #fff; margin-bottom: 10px; }
        .product-price span { font-size: 16px; color: #00ff66; font-weight: 500; }
        
        .discount-info { color: #00ff66; font-size: 14px; font-weight: 500; margin-bottom: 30px; display: flex; align-items: center; gap: 8px; }

        .specs-list { list-style: none; padding: 0; margin-bottom: 30px; }
        .specs-list li { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #94A3B8; font-size: 15px; }
        .specs-list li i { width: 20px; font-size: 18px; color: #00F0FF; margin-top: 3px; }
        .specs-list li strong { color: #fff; display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }

        .btn-buy { width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; padding: 18px; border-radius: 8px; text-decoration: none; transition: 0.3s; margin-bottom: 15px; }
        .btn-whatsapp { background: #00ff66; color: #000; box-shadow: 0 4px 15px rgba(0, 255, 102, 0.2); }
        .btn-whatsapp:hover { background: #00cc52; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0, 255, 102, 0.4); }

        .safe-buy { text-align: center; color: #94A3B8; font-size: 12px; display: flex; flex-direction: column; gap: 5px; }
        .safe-buy i { color: #00F0FF; }

        /* NUEVA CAJA DE DESCRIPCIÓN TIPO MERCADOLIBRE */
        .product-description-box { margin-top: 40px; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); }
        .product-description-box h3 { font-size: 20px; color: #fff; margin-bottom: 15px; font-weight: 600; }
        .product-description-box p { color: #94A3B8; font-size: 14px; line-height: 1.8; white-space: pre-wrap; font-weight: 300; }

        @media (max-width: 768px) {
            .product-container { grid-template-columns: 1fr; margin-top: 100px; gap: 20px; }
            .product-title { font-size: 22px; }
            .main-image { height: 300px; }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 10px; color: inherit;">
                    <svg class="logo-svg" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="7" width="16" height="11" rx="1.5" stroke="#00F0FF" stroke-width="2"/>
                        <path d="M6 18L4 23H16L14 18" stroke="#00F0FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <rect x="21" y="5" width="8" height="18" rx="1.5" stroke="#00F0FF" stroke-width="2"/>
                        <path d="M24 8H26" stroke="#00F0FF" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M24 11H26" stroke="#00F0FF" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M7 12.5H13M10 9.5V15.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <span>Computadoras Lei</span>
                </a>
            </div>
            <a href="javascript:history.back()" style="color: #00F0FF; text-decoration: none; font-weight: 600; font-size: 14px;"><i class="fa-solid fa-arrow-left"></i> Volver</a>
        </nav>
    </header>

    <div class="product-container" id="contenido-producto">
        <div style="grid-column: 1 / -1; text-align: center; padding: 60px; color: #00F0FF;">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 40px; margin-bottom: 20px;"></i>
            <h3>Cargando detalles del producto...</h3>
        </div>
    </div>

    <footer class="footer"><p>&copy; 2026 Computadoras Lei. Lugano, CABA, Argentina.</p></footer>

    <!-- GALERÍA LIGHTBOX -->
    <div id="gallery-modal" class="modal">
        <span class="close-modal" onclick="closeGallery()">&times;</span>
        <div class="modal-content">
            <img id="modal-img" src="" alt="Imagen">
            <button class="gallery-btn prev-btn" onclick="changeImage(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <button class="gallery-btn next-btn" onclick="changeImage(1)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        <div class="gallery-counter"><span id="current-img-num">1</span> / <span id="total-img-num">3</span></div>
    </div>

    <script src="js/script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productoId = urlParams.get('id');
        const productoCat = urlParams.get('cat'); // puede ser: notebooks, memorias, accesorios
        const contenedor = document.getElementById('contenido-producto');

        async function cargarDetalleProducto() {
            if (!productoId || !productoCat) {
                contenedor.innerHTML = '<h2 style="color:red; text-align:center;">Producto no encontrado.</h2>';
                return;
            }

            try {
                const { data, error } = await db.from(productoCat).select('*').eq('id', productoId).single();
                if (error || !data) throw error;

                // Armar las imágenes
                let arrayImagenes = ['https://via.placeholder.com/1280x960/0b0f17/00F0FF?text=Sin+Foto'];
                if (data.imagen && data.imagen.trim() !== '') {
                    arrayImagenes = data.imagen.split(',');
                }
                
                let miniaturasHTML = '';
                arrayImagenes.forEach((img, idx) => {
                    miniaturasHTML += `<img src="${img}" class="thumbnail ${idx === 0 ? 'active' : ''}" onclick="cambiarFotoPrincipal(this, '${img}')">`;
                });

                // Formateo de precio
                const precioFormateado = new Intl.NumberFormat('es-AR').format(data.precio);
                
                // Mensaje WS
                const mensajeWs = encodeURIComponent(`Hola Lei! Me interesa el producto "${data.titulo}" a $${precioFormateado} que vi en tu web. ¿Tenés stock?`);

                // Armar lista de características según categoría
                let caracteristicasHTML = '';
                let tagTexto = 'Producto Premium';

                if (productoCat === 'notebooks') {
                    tagTexto = 'Notebook Testeada y Garantizada';
                    caracteristicasHTML = `
                        <li><i class="fa-solid fa-microchip"></i><div><strong>Procesador</strong>${data.procesador}</div></li>
                        <li><i class="fa-solid fa-memory"></i><div><strong>Memoria RAM</strong>${data.ram}</div></li>
                        <li><i class="fa-solid fa-hard-drive"></i><div><strong>Almacenamiento</strong>${data.almacenamiento}</div></li>
                        <li><i class="fa-solid fa-battery-full"></i><div><strong>Batería</strong>${data.bateria}</div></li>
                    `;
                } else if (productoCat === 'memorias') {
                    tagTexto = 'Componente ' + data.tipo;
                    caracteristicasHTML = `
                        <li><i class="fa-solid fa-tag"></i><div><strong>Capacidad</strong>${data.capacidad}</div></li>
                        <li><i class="fa-solid fa-bolt"></i><div><strong>Velocidad / Frecuencia</strong>${data.detalle_1}</div></li>
                        <li><i class="fa-solid fa-desktop"></i><div><strong>Formato / Tipo</strong>${data.detalle_2}</div></li>
                        <li><i class="fa-solid fa-circle-check"></i><div><strong>Estado</strong>${data.estado}</div></li>
                    `;
                } else if (productoCat === 'accesorios') {
                    tagTexto = 'Accesorio: ' + data.tipo;
                    caracteristicasHTML = `
                        <li><i class="fa-solid fa-tag"></i><div><strong>Categoría</strong>${data.tipo}</div></li>
                        <li><i class="fa-solid fa-circle-info"></i><div><strong>Detalle Principal</strong>${data.detalle_1}</div></li>
                        <li><i class="fa-solid fa-star"></i><div><strong>Detalle Secundario</strong>${data.detalle_2}</div></li>
                        <li><i class="fa-solid fa-circle-check"></i><div><strong>Estado</strong>${data.estado}</div></li>
                    `;
                }

                // Armar bloque de descripción si es que tiene texto cargado
                let descripcionHTML = '';
                if (data.descripcion && data.descripcion.trim() !== '') {
                    descripcionHTML = `
                        <div class="product-description-box">
                            <h3>Descripción del producto</h3>
                            <p>${data.descripcion}</p>
                        </div>
                    `;
                }

                // Inyectar HTML
                contenedor.innerHTML = `
                    <div class="product-gallery">
                        <img src="${arrayImagenes[0]}" class="main-image" id="img-principal" onclick="openGalleryDinamic('${data.imagen || ''}')">
                        <div class="thumbnail-container">
                            ${miniaturasHTML}
                        </div>
                    </div>
                    <div class="product-details">
                        <span class="product-tag">${tagTexto}</span>
                        <h1 class="product-title">${data.titulo}</h1>
                        
                        <div class="product-price">$${precioFormateado} <span>ARS</span></div>
                        <div class="discount-info"><i class="fa-solid fa-bolt"></i> Descuento especial abonando en Efectivo / Transferencia</div>

                        <ul class="specs-list">
                            ${caracteristicasHTML}
                        </ul>

                        <a href="https://wa.me/5491140822356?text=${mensajeWs}" target="_blank" class="btn-buy btn-whatsapp">
                            <i class="fa-brands fa-whatsapp" style="font-size: 20px;"></i> Consultar Disponibilidad
                        </a>
                        
                        <div class="safe-buy">
                            <span><i class="fa-solid fa-shield-halved"></i> Compra Protegida y Garantizada</span>
                            <span><i class="fa-solid fa-truck-fast"></i> Envíos o retiros a coordinar en Lugano (CABA)</span>
                        </div>

                        ${descripcionHTML}
                    </div>
                `;

            } catch (err) {
                console.error(err);
                contenedor.innerHTML = '<h2 style="color:red; text-align:center;">Hubo un error al cargar el producto.</h2>';
            }
        }

        function cambiarFotoPrincipal(elemento, url) {
            document.getElementById('img-principal').src = url;
            document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
            elemento.classList.add('active');
        }

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof db !== 'undefined') { cargarDetalleProducto(); }
        });
    </script>
</body>
</html>
