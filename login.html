<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Computadoras Lei</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: radial-gradient(circle at center, #101626 0%, #070A0F 100%); 
            color: #fff; 
            display: flex; 
            height: 100vh; 
            align-items: center; 
            justify-content: center;
        }
        .login-box {
            background: #111622;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .login-box h2 {
            color: #00F0FF;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #94A3B8; font-size: 13px; font-weight: 600; text-transform: uppercase; }
        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 8px; 
            background: #070A0F; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #fff; 
            font-size: 14px; 
            outline: none; 
            transition: 0.3s; 
        }
        input:focus { border-color: #00F0FF; }
        
        .btn { 
            background: #00F0FF; 
            color: #070A0F; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 15px; 
            width: 100%; 
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:hover { background: #00B8CC; transform: translateY(-2px); }
        
        .error-msg {
            color: #ff4a4a;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            background: rgba(255, 74, 74, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 74, 74, 0.2);
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2><i class="fa-solid fa-shield-halved"></i> Acceso Seguro</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" placeholder="admin@computadoraslei.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="btn-login" class="btn">Iniciar Sesión</button>
            <div id="error-message" class="error-msg">Credenciales incorrectas. Intentalo de nuevo.</div>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbsjjqrizxdinmzystfu.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_CNCfFsHb-yGfE45YhHoFHQ_mS1Cpi7C';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Si ya está logueado, lo mandamos directo al console
        async function checkSession() {
            const { data: { session } } = await db.auth.getSession();
            if (session) { window.location.href = 'console.html'; }
        }
        checkSession();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errorMsg = document.getElementById('error-message');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verificando...';
            btn.style.pointerEvents = 'none';
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await db.auth.signInWithPassword({ email: email, password: password });

            if (error) {
                errorMsg.innerText = "Error: Credenciales incorrectas.";
                errorMsg.style.display = 'block';
                btn.innerHTML = 'Iniciar Sesión';
                btn.style.pointerEvents = 'auto';
            } else {
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Acceso Permitido';
                btn.style.background = '#00ff66';
                setTimeout(() => { window.location.href = 'console.html'; }, 1000);
            }
        });
    </script>
</body>
</html>
